<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}" data-theme="dark">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <div id="auth-gate" class="auth-gate" hidden>
    {{ partial "auth-gate.html" . }}
  </div>

  <div id="app" class="app" hidden>
    {{ partial "nav.html" . }}
    <main class="main">
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
  </div>

  {{ partial "scripts.html" . }}
</body>
</html>
